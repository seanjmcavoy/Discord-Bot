{
    "extractor": {
        "pixiv": {
            "ugoira": true,
            "postprocessors": ["ugoira-gif"]
        }
    },

    "postprocessor": {
         "ugoira-gif": {
            "name": "ugoira",
            "extension": "gif",
            "ffmpeg-args": [
                "-r", "15",
                "-filter_complex",
               "[0:v] fps=15, scale='if(gt(iw,720),720,iw)':-1:flags=lanczos, split[s0][s1];[s0] palettegen [p];[s1][p] paletteuse=dither=sierra2_4a"
            ],
            "repeat-last-frame": false
        }
    }
}